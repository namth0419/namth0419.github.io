<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{NAME}} — Curriculum Vitae</title>
<meta name="description" content="{{DESC}}">
<meta name="author" content="{{NAME}}">
{{VERIFY}}

<!-- 링크를 공유했을 때 뜨는 미리보기 -->
<meta property="og:type" content="profile">
<meta property="og:title" content="{{NAME}} — Curriculum Vitae">
<meta property="og:description" content="{{DESC}}">
<meta property="og:image" content="{{SITE_URL}}/assets/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="{{SITE_URL}}/">
<meta name="twitter:card" content="summary_large_image">
<link rel="canonical" href="{{SITE_URL}}/">

<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

<!-- 테마를 그리기 전에 결정 (새로고침 시 깜빡임 방지) -->
<script>
  (function(){
    var t = "light";
    try{
      t = localStorage.getItem("theme")
          || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    }catch(e){}
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light;
    --ink:#12161a;
    --wafer:#E8EAE6;
    --card:#F4F5F2;
    --rule:#CDD1CA;
    --muted:#6E7671;
    --deep:#1E2A78;
    --film-1:#1E2A78;
    --film-2:#6E2E8F;
    --film-3:#B98B22;
    --film-4:#2A7F6F;
    --film: linear-gradient(90deg,var(--film-1) 0%,var(--film-2) 34%,var(--film-3) 67%,var(--film-4) 100%);
    --display:"Archivo",system-ui,sans-serif;
    --body:"Source Serif 4",Georgia,serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
    --shot:.5;          /* 로고 기본 불투명도 */
    --port:grayscale(1) contrast(1.04);
  }
  /* 어두운 실험실: 같은 웨이퍼를 조명 아래에서 본 상태 */
  :root[data-theme="dark"]{
    color-scheme:dark;
    --ink:#E4E8E3;
    --wafer:#0F1216;
    --card:#171B21;
    --rule:#282E35;
    --muted:#868E88;
    --deep:#93A7FF;
    --film-1:#5C6CE8;
    --film-2:#A867D8;
    --film-3:#E3B754;
    --film-4:#4CC6AC;
    --shot:.62;
    --port:grayscale(1) contrast(1.02) brightness(.88);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    background:var(--wafer);
    color:var(--ink);
    font-family:var(--body);
    font-size:16px;
    line-height:1.62;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--deep);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--deep) 30%,transparent)}
  a:hover{border-bottom-color:var(--deep)}
  :focus-visible{outline:2px solid var(--deep);outline-offset:3px}

  /* thin-film interference bar: the one loud element */
  .film-top{position:fixed;top:0;left:0;right:0;height:3px;background:var(--film);z-index:20}
  .progress{position:fixed;top:0;left:0;height:3px;width:0;background:var(--ink);opacity:.55;z-index:21;transition:width .08s linear}

  .shell{max-width:1140px;margin:0 auto;padding:52px 28px 96px;display:grid;grid-template-columns:274px 1fr;gap:60px;align-items:start}

  /* ---- left rail: the substrate ---- */
  .rail{
    position:sticky;top:44px;
    /* 레일이 뷰포트보다 길면 레일 안에서 스크롤 (짧은 화면에서 하단 항목이 잘리는 것 방지) */
    max-height:calc(100vh - 68px);
    overflow-y:auto;
    padding-right:12px;margin-right:-12px;   /* 스크롤바를 콘텐츠 밖으로 */
    scrollbar-width:thin;scrollbar-color:var(--rule) transparent;
  }
  .rail::-webkit-scrollbar{width:6px}
  .rail::-webkit-scrollbar-track{background:transparent}
  .rail::-webkit-scrollbar-thumb{background:var(--rule);border-radius:3px}
  .rail:hover::-webkit-scrollbar-thumb{background:var(--muted)}
  .portrait{
    width:116px;height:150px;object-fit:cover;display:block;
    border:1px solid var(--rule);
    filter:var(--port);
    background:var(--card);
  }
  .portrait-wrap{position:relative;width:116px;margin-bottom:18px}
  .portrait-wrap::after{content:"";position:absolute;left:0;right:0;bottom:-5px;height:3px;background:var(--film)}
  .name{
    font-family:var(--display);font-weight:700;font-size:29px;line-height:1.06;
    letter-spacing:-.022em;margin:0 0 6px;
  }
  .role{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 16px;line-height:1.65}
  .meta{list-style:none;margin:0 0 20px;padding:0;font-family:var(--mono);font-size:11.5px;line-height:1.9}
  .meta li{display:flex;gap:9px}
  .meta .k{color:var(--muted);min-width:52px;flex:none}
  .meta a{border:none;color:var(--ink)}
  .meta a:hover{color:var(--deep)}
  /* download actions */
  .actions{margin:0 0 18px}
  .btn{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;
    padding:8px 11px;border:1px solid var(--ink);color:var(--ink);
    background:transparent;border-radius:2px;width:100%;
    transition:background .16s,color .16s,border-color .16s;
  }
  .btn:hover{background:var(--ink);color:var(--wafer);border-color:var(--ink)}
  .btn .sub{font-size:9.5px;opacity:.55;letter-spacing:.06em}
  .btn.ghost{
    margin-top:6px;border-color:var(--rule);color:var(--muted);
    font-size:10.5px;padding:6px 11px;
  }
  .btn.ghost:hover{background:transparent;color:var(--deep);border-color:var(--deep)}

  /* profile links */
  .social{list-style:none;margin:0 0 18px;padding:0;border-top:1px solid var(--rule)}
  .social li{border-bottom:1px solid var(--rule)}
  .social a{
    display:flex;align-items:center;gap:9px;padding:7px 0;border:none;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.02em;color:var(--ink);
  }
  .social a .ico{width:13px;height:13px;flex:none;color:var(--muted);transition:color .15s}
  .social a .arw{margin-left:auto;font-size:10px;color:var(--muted);transition:transform .15s}
  .social a:hover{color:var(--deep)}
  .social a:hover .ico{color:var(--film-2)}
  .social a:hover .arw{transform:translate(2px,-2px)}

  nav{border-top:1px solid var(--rule);padding-top:12px}
  nav ol{list-style:none;margin:0;padding:0;font-family:var(--mono);font-size:12px}
  nav li{margin:0}
  nav a{
    display:flex;gap:10px;align-items:baseline;color:var(--muted);border:none;padding:2.5px 0;
  }
  nav a .n{font-size:10px;opacity:.6;min-width:16px}
  nav a:hover,nav a.on{color:var(--ink)}
  nav a.on .n{color:var(--film-2);opacity:1}

  /* ---- right column: the stack ---- */
  main{min-width:0;border-left:1px solid var(--rule);padding-left:44px}
  section{padding:0 0 46px;scroll-margin-top:40px}
  section + section{border-top:1px solid var(--rule);padding-top:34px}
  h2{
    font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);margin:0 0 20px;
    display:flex;align-items:center;gap:12px;
  }
  h2::after{content:"";flex:1;height:1px;background:var(--rule)}
  .lede{font-size:19.5px;line-height:1.6;margin:0;max-width:62ch}
  .lede em{font-style:italic;color:var(--deep)}

  /* entries */
  .entry{display:grid;grid-template-columns:148px 1fr;gap:22px;padding:14px 0}
  .entry + .entry{border-top:1px dotted var(--rule)}
  .when{font-family:var(--mono);font-size:11.5px;color:var(--muted);line-height:1.7;padding-top:3px}
  .what{margin:0}
  .what h3{font-family:var(--display);font-weight:600;font-size:16.5px;letter-spacing:-.01em;margin:0 0 3px;line-height:1.35}
  .what p{margin:0;color:var(--muted);font-size:14.5px;line-height:1.6}
  .what .tag{font-family:var(--mono);font-size:11.5px;color:var(--muted)}

  /* research areas */
  .area{padding:18px 0}
  .area + .area{border-top:1px dotted var(--rule)}
  .area > h3{
    font-family:var(--display);font-weight:600;font-size:17px;margin:0 0 4px;letter-spacing:-.01em;
    display:flex;gap:12px;
  }
  .area > h3 .idx{font-family:var(--mono);font-size:12px;color:var(--film-2);padding-top:3px}
  .sub{margin:12px 0 0 0;padding-left:24px;border-left:2px solid var(--rule)}
  .sub h4{font-family:var(--body);font-style:italic;font-weight:600;font-size:15px;margin:0 0 6px;color:var(--ink)}
  .sub ul{margin:0 0 16px;padding-left:17px;font-size:14.3px;color:var(--muted)}
  .sub li{margin:0 0 4px}
  .sub > div:last-child ul{margin-bottom:0}

  /* skills */
  .skill{display:grid;grid-template-columns:196px 1fr;gap:22px;padding:12px 0}
  .skill + .skill{border-top:1px dotted var(--rule)}
  .skill h3{font-family:var(--mono);font-weight:500;font-size:11.5px;letter-spacing:.05em;color:var(--muted);margin:3px 0 0;text-transform:uppercase;line-height:1.6}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{
    font-family:var(--mono);font-size:11.5px;line-height:1;padding:6px 9px;
    background:var(--card);border:1px solid var(--rule);color:var(--muted);border-radius:2px;
  }

  /* publications / patents */
  ol.list{list-style:none;counter-reset:it;margin:0;padding:0}
  ol.list li{
    counter-increment:it;position:relative;padding:13px 0 13px 40px;font-size:14.6px;line-height:1.58;
  }
  ol.list li + li{border-top:1px dotted var(--rule)}
  ol.list li::before{
    content:counter(it,decimal-leading-zero);position:absolute;left:0;top:16px;
    font-family:var(--mono);font-size:11px;color:var(--muted);
  }

  /* two-column entries: graphical abstract + citation */
  ol.list li.has-fig{
    display:grid;grid-template-columns:168px 1fr;gap:20px;align-items:start;
    padding-top:16px;padding-bottom:16px;
  }
  .pub-fig{margin:0}
  .pub-fig a{display:block;border:none;line-height:0}
  .pub-fig img{
    width:100%;height:auto;max-height:190px;object-fit:contain;
    background:var(--card);border:1px solid var(--rule);padding:5px;
    display:block;transition:border-color .16s;
  }
  .pub-fig a:hover img{border-color:var(--film-2)}
  .pub-fig .cap{
    font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--muted);margin-top:5px;display:block;line-height:1.5;
  }
  @media (max-width:640px){
    ol.list li.has-fig{grid-template-columns:1fr;gap:12px}
    .pub-fig{max-width:230px}
  }
  .me{font-weight:600;border-bottom:2px solid var(--film-3);}
  .venue{font-style:italic}
  .pdetail{color:var(--muted);font-size:13.4px}
  .st{
    font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 6px;border:1px solid var(--rule);border-radius:2px;color:var(--muted);
    white-space:nowrap;margin-left:4px;position:relative;top:-1px;
  }
  .st.pub{color:var(--film-1);border-color:color-mix(in srgb,var(--film-1) 42%,transparent)}
  .st.acc{color:var(--film-4);border-color:color-mix(in srgb,var(--film-4) 50%,transparent)}
  .note{font-family:var(--mono);font-size:11px;color:var(--muted);margin:16px 0 0}

  /* per-entry links: DOI / PDF / code */
  .links{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .lnk{
    font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;
    padding:3px 8px;border:1px solid var(--rule);border-radius:2px;
    color:var(--muted);background:transparent;line-height:1.6;
    transition:color .15s,border-color .15s,background .15s;
  }
  .lnk:hover{color:var(--wafer);background:var(--deep);border-color:var(--deep)}
  .lnk.pdf:hover{background:var(--film-2);border-color:var(--film-2)}

  /* figures — drop an image anywhere in a section */
  figure{margin:20px 0;padding:0}
  figure img{width:100%;display:block;border:1px solid var(--rule);background:var(--card)}
  figure figcaption{
    font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--muted);
    margin-top:8px;padding-left:11px;border-left:2px solid var(--film-3);
  }
  figure figcaption b{color:var(--ink);font-weight:500}
  .fig-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
  .fig-row figure{margin:0}
  .fig-narrow{max-width:460px}
  @media (max-width:640px){ .fig-row{grid-template-columns:1fr} }

  footer{
    max-width:1140px;margin:0 auto;padding:0 28px 60px;
    font-family:var(--mono);font-size:11px;color:var(--muted);
    display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }

  @media (max-width:900px){
    .shell{grid-template-columns:1fr;gap:34px;padding:40px 20px 70px}
    .rail{position:static;max-height:none;overflow:visible;padding-right:0;margin-right:0}
    main{border-left:none;padding-left:0}
    nav{display:none}
    .entry,.skill{grid-template-columns:1fr;gap:6px}
    .when{padding-top:0}
    .name{font-size:34px}
  }
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    *{transition:none!important;animation:none!important}
  }
  @media print{
    .film-top,.progress,nav,.theme-toggle{display:none}
    :root{color-scheme:light}
    body{background:#fff}
    .shell{display:block;max-width:none;padding:0}
    main{border:none;padding:0}
    section{break-inside:avoid}
  }
  /* theme toggle */
  .theme-toggle{
    position:fixed;top:14px;right:16px;z-index:30;
    width:34px;height:34px;display:grid;place-items:center;
    border:1px solid var(--rule);background:var(--wafer);color:var(--muted);
    border-radius:2px;cursor:pointer;padding:0;
    transition:color .16s,border-color .16s,background .16s;
  }
  .theme-toggle:hover{color:var(--ink);border-color:var(--muted)}
  .theme-toggle svg{width:15px;height:15px;display:none}
  .theme-toggle .moon{display:block}
  :root[data-theme="dark"] .theme-toggle .moon{display:none}
  :root[data-theme="dark"] .theme-toggle .sun{display:block}

  /* news */
  .news-item{display:grid;grid-template-columns:104px 1fr;gap:18px;padding:9px 0}
  .news-item + .news-item{border-top:1px dotted var(--rule)}
  .news-item .d{font-family:var(--mono);font-size:11px;color:var(--muted);padding-top:3px;letter-spacing:.03em}
  .news-item .t{margin:0;font-size:14.6px;line-height:1.55}
  @media (max-width:640px){
    .news-item{grid-template-columns:1fr;gap:3px}
    .news-item .d{padding-top:0}
  }

  /* affiliations coda */
  .affil{max-width:1140px;margin:0 auto;padding:0 28px}
  .affil-inner{border-top:1px solid var(--rule);padding:30px 0 30px}
  .affil h2{
    font-family:var(--mono);font-weight:500;font-size:10px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--muted);margin:0 0 18px;
  }
  .affil-row{display:flex;flex-wrap:wrap;gap:16px 44px;align-items:flex-end;margin:0}
  .affil-item{
    display:flex;flex-direction:column;gap:8px;border:none;
    text-decoration:none;align-items:flex-start;
  }
  .affil-item img{
    height:38px;width:auto;max-width:190px;
    object-fit:contain;object-position:left bottom;display:block;
    filter:grayscale(1);opacity:var(--shot);transition:filter .18s,opacity .18s;
  }
  .affil-item:hover img{filter:none;opacity:1}
  .affil-item .lg-dark{display:none}
  :root[data-theme="dark"] .affil-item .lg-light.has-alt{display:none}
  :root[data-theme="dark"] .affil-item .lg-dark{display:block}
  .affil-item .wm{
    font-family:var(--display);font-weight:600;font-size:17.5px;letter-spacing:-.005em;
    color:var(--ink);opacity:.68;transition:opacity .18s,color .18s;line-height:1;
  }
  .affil-item:hover .wm{opacity:1;color:var(--deep)}
  .affil-item .yr{
    font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--muted);
    text-transform:uppercase;line-height:1;
  }
  @media (max-width:640px){
    .affil-row{gap:18px 28px}
    .affil-item img{height:30px}
    .affil-item .wm{font-size:15px}
  }
  @media print{ .affil{display:none} }
</style>
{{ANALYTICS}}
</head>
<body>
<div class="film-top"></div>
<div class="progress" id="pg"></div>

<button class="theme-toggle" id="tt" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
  <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
       stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>
  </svg>
  <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
       stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="4.2"/>
    <path d="M12 2v2.4M12 19.6V22M2 12h2.4M19.6 12H22M4.9 4.9l1.7 1.7M17.4 17.4l1.7 1.7M19.1 4.9l-1.7 1.7M6.6 17.4l-1.7 1.7"/>
  </svg>
</button>

<div class="shell">
  <aside class="rail">
    <div class="portrait-wrap">
      <img class="portrait" src="{{PHOTO}}" alt="Portrait of {{NAME}}">
    </div>
    <h1 class="name">{{NAME_BR}}</h1>
    <p class="role">{{ROLE}}</p>
    <ul class="meta">
{{META}}
    </ul>
    <div class="actions">
      <a class="btn" href="cv.pdf" target="_blank" rel="noopener">
        <span>Download CV — PDF</span><span class="sub">LaTeX ↓</span>
      </a>
      <a class="btn ghost" href="cv.tex" download>LaTeX source (.tex)</a>
    </div>
    <ul class="social">
{{SOCIAL}}
    </ul>
    <nav aria-label="Sections">
      <ol>
{{NAV}}
      </ol>
    </nav>
  </aside>

  <main>
{{SECTIONS}}
  </main>
</div>

<section class="affil" aria-label="Affiliations">
  <div class="affil-inner">
    <h2>Affiliations</h2>
    <div class="affil-row">
{{INSTITUTIONS}}
    </div>
  </div>
</section>

<footer>
  <span>{{NAME}} · Curriculum Vitae · Last updated {{UPDATED}}</span>
  <span>{{FOOTER_RIGHT}}</span>
</footer>

<script>
  // 테마 토글
  (function(){
    var btn = document.getElementById('tt');
    if(!btn) return;
    btn.addEventListener('click', function(){
      var root = document.documentElement;
      var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try{ localStorage.setItem('theme', next); }catch(e){}   // 저장 불가여도 동작은 함
    });
  })();

  // BibTeX 복사 (실패하면 cite.bib 파일을 여는 것으로 자연스럽게 후퇴)
  (function(){
    function legacyCopy(txt){
      var ta = document.createElement('textarea');
      ta.value = txt; ta.setAttribute('readonly','');
      ta.style.cssText = 'position:fixed;top:-1000px;opacity:0';
      document.body.appendChild(ta); ta.select();
      var ok = false;
      try{ ok = document.execCommand('copy'); }catch(e){}
      document.body.removeChild(ta);
      return ok;
    }
    document.querySelectorAll('.lnk.bib').forEach(function(b){
      b.addEventListener('click', function(e){
        e.preventDefault();
        var txt = b.getAttribute('data-bib');
        var done = function(){
          var old = b.textContent; b.textContent = 'Copied';
          setTimeout(function(){ b.textContent = old; }, 1400);
        };
        var fail = function(){ if(legacyCopy(txt)) done(); else window.location.href = b.href; };
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(txt).then(done, fail);
        }else{ fail(); }
      });
    });
  })();

  (function(){
    var pg = document.getElementById('pg');
    var links = Array.prototype.slice.call(document.querySelectorAll('nav a'));
    var secs = links.map(function(a){ return document.querySelector(a.getAttribute('href')); });
    function onScroll(){
      var h = document.documentElement.scrollHeight - window.innerHeight;
      pg.style.width = (h > 0 ? (window.scrollY / h) * 100 : 0) + '%';
      var i = 0;
      for (var j = 0; j < secs.length; j++){
        if (secs[j] && secs[j].getBoundingClientRect().top <= 120) i = j;
      }
      links.forEach(function(a, k){ a.classList.toggle('on', k === i); });
    }
    window.addEventListener('scroll', onScroll, {passive:true});
    onScroll();
  })();
</script>
</body>
</html>
